# ─────────────────────────────────────────────────────────────
# Shared Redis application.yml snippet
# Copy/merge into each service's src/main/resources/application.yml
# For Docker, override SPRING_REDIS_HOST=redis (service name)
# ─────────────────────────────────────────────────────────────
spring:
  redis:
    host: ${SPRING_REDIS_HOST:localhost}   # override to 'redis' inside Docker
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}    # empty = no auth
    database: 0
    pool:
      max-active: 20
      max-idle: 10
      min-idle: 2
      max-wait: 3000

  cache:
    type: redis
    redis:
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "${spring.application.name}:"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    redis:
      enabled: true
